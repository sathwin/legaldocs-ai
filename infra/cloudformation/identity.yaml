AWSTemplateFormatVersion: "2010-09-09"
Description: Cognito identity scaffold for LegalDocs AI.

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: legaldocs-demo-users
      AutoVerifiedAttributes: [email]
      MfaConfiguration: OPTIONAL

  LegalReviewerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: legal-reviewer
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Value: !Ref UserPool

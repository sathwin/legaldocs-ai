AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda and Step Functions workflow scaffold for LegalDocs AI ingestion.

Resources:
  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  IngestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"accepted": True}

  WorkflowRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole

  ContractWorkflow:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt WorkflowRole.Arn
      DefinitionString: |
        {
          "StartAt": "ExtractText",
          "States": {
            "ExtractText": { "Type": "Pass", "Next": "ChunkDocument" },
            "ChunkDocument": { "Type": "Pass", "Next": "EmbedChunks" },
            "EmbedChunks": { "Type": "Pass", "Next": "AnalyzeClauses" },
            "AnalyzeClauses": { "Type": "Pass", "End": true }
          }
        }

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legaldocs-api
  namespace: legaldocs-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legaldocs-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legaldocs-web
  namespace: legaldocs-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legaldocs-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

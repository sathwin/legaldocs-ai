apiVersion: apps/v1
kind: Deployment
metadata:
  name: legaldocs-web
  namespace: legaldocs-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legaldocs-web
  template:
    metadata:
      labels:
        app: legaldocs-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/legaldocs-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

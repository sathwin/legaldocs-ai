services:
  backend:
    build:
      context: ./backend
    container_name: legaldocs-api
    environment:
      LEGALDOCS_DEMO_MODE: "true"
      LEGALDOCS_LLM_PROVIDER: "mock"
      LEGALDOCS_CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    container_name: legaldocs-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

  worker:
    build:
      context: ./workers
    container_name: legaldocs-worker
    environment:
      LEGALDOCS_WORKER_ONCE: "false"
      REDIS_URL: redis://redis:6379/0
      VECTOR_STORE_URL: http://vector-store:8000
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: legaldocs-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: legaldocs-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    container_name: legaldocs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
